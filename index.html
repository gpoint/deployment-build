<body>
  <div id="app">

    <div>
      <style>
        /* Full screen centering */
        .app-loader-container {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          width: 100vw;
          background-color: #ffffff;
          /* Adjust to match your app's background */
          margin: 0;
        }

        /* 2x2 Grid setup */
        .spinner-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 6px;
          /* Spacing between the blocks */
          width: 50px;
          height: 50px;
        }

        /* Base block styling */
        .spinner-block {
          width: 100%;
          height: 100%;
          /* 40% border-radius mimics the organic, highly-rounded curves of your logo */
          border-radius: 10%;
          animation: pulse-beat 1.2s infinite ease-in-out;
        }

        /* Colors sampled from your logo & staggered animation for a circular wave */
        /* Top Left */
        .block-1 {
          background-color: #9CDE50;
          animation-delay: 0s;
        }

        /* Top Right */
        .block-2 {
          background-color: #3D933B;
          animation-delay: 0.15s;
        }

        /* Bottom Left */
        .block-3 {
          background-color: #3D933B;
          animation-delay: 0.45s;
        }

        /* Bottom Right */
        .block-4 {
          background-color: #9CDE50;
          animation-delay: 0.3s;
        }

        /* The pulsing/beating keyframe */
        @keyframes pulse-beat {

          0%,
          100% {
            transform: scale(1);
            opacity: 1;
          }

          50% {
            transform: scale(0.3);
            opacity: 0.4;
          }
        }
      </style>

      <div class="app-loader-container">
        <div class="spinner-grid">
          <div class="spinner-block block-1"></div>
          <div class="spinner-block block-2"></div>
          <div class="spinner-block block-3"></div>
          <div class="spinner-block block-4"></div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
